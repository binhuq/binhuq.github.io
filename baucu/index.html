<!doctype html>

<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tra cứu điểm bầu cử - Phường Dĩ An</title>
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="togeojson.js"></script>
    <script
      defer

    <style data-purpose="custom-theme">
      :root {
        --vn-red: #da251d;
        --vn-yellow: #ffff00;
      }
      .bg-vn-red {
        background-color: var(--vn-red);
      }
      .text-vn-red {
        color: var(--vn-red);
      }
      .border-vn-red {
        border-color: var(--vn-red);
      }
      .bg-vn-yellow {
        background-color: var(--vn-yellow);
      }

      /* Smooth transition for result appearance */
      #result-container {
        transition: all 0.3s ease-in-out;
      }

  <body class="min-h-screen bg-gray-50 font-sans text-gray-900">
    <!-- BEGIN: MainHeader -->
    <header
      class="bg-vn-red top-0 z-50 px-4 py-6 text-white shadow-lg"
      data-purpose="app-header"
    >
      <div class="mx-auto flex max-w-7xl items-center justify-between">
        <div class="flex items-center space-x-3">
          <!-- National Emblem Placeholder -->
          <div
            class="bg-vn-yellow flex h-12 w-12 items-center justify-center rounded-full shadow-inner"
          >
            <img src="./imgs/logo.webp" />
          </div>
          <div class="md md:flex">
            <h1 class="font-bold uppercase leading-tight sm:text-xl">
              Tra cứu điểm bầu cử
              <span class="hidden sm:inline">Phường Dĩ An</span>
            </h1>
            <p class="font-bold uppercase sm:hidden sm:text-xl">Phường Dĩ An</p>
          </div>
        </div>
      </div>
    </header>
    <!-- END: MainHeader -->
    <main

      class="mx-auto max-w-5xl space-y-6 py-6 md:px-4 xl:max-w-7xl"

      <!-- BEGIN: SelectionArea -->
      <section
        class="rounded-2xl border border-gray-100 bg-white p-5 shadow-sm"
        data-purpose="selection-form"

        <h2 class="mb-4 flex items-center text-lg font-semibold text-gray-800">
          <span class="bg-vn-red mr-2 h-6 w-1.5 rounded-full"></span>
          Thông tin khu vực cư trú
        </h2>
        <div class="space-y-4">
          <!-- Khu phố / Ấp Selection -->
          <div class="space-y-2">
            <label
              class="block text-sm font-medium text-gray-700"
              for="ward-select"
              >Chọn Khu phố</label
            >
            <div class="relative">
              <select
                class="focus:border-vn-red focus:ring-vn-red block w-full appearance-none rounded-xl border-gray-300 py-3 pl-4 pr-10 text-base focus:outline-none"
                id="neighborhood"
                x-model="selectedNeighborhoodId"
                @change="handleNeighborhoodChange"
              >
                <option value="" disabled selected>-- Chọn Khu phố --</option>
                <template x-for="n in Object.keys(neighborhoods)" :key="n">
                  <option :value="n" x-text="n"></option>
                </template>
              </select>
              <!-- <div
                class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500"
              >
                <svg
                  class="h-5 w-5"
                  fill="none"
                  stroke="currentColor"
                  viewbox="0 0 24 24"
                >
                  <path
                    d="M19 9l-7 7-7-7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                  ></path>
                </svg>
              </div> -->
            </div>
          </div>
          <!-- Tổ bầu cử Selection -->
          <div class="space-y-2">
            <label
              class="block text-sm font-medium text-gray-700"
              for="unit-select"
              >Chọn Tổ Nhân dân tự quản, khu dân cư, Chung cư</label
            >
            <div class="relative">
              <select
                id="station"
                x-model="selectedStationId"
                :disabled="!selectedNeighborhoodId"
                class="focus:border-vn-red focus:ring-vn-red block w-full appearance-none rounded-xl border-gray-300 py-3 pl-4 pr-10 text-base focus:outline-none"
                id="unit-select"
              >
                <option value="" disabled selected>
                  -- Chọn Tổ Nhân dân tự quản, khu dân cư, Chung cư --
                </option>
                <template x-if="selectedNeighborhood">
                  <template
                    x-for="s in selectedNeighborhood"
                    :key="s.properties.name"
                  >
                    <option
                      :value="s.properties.name"
                      x-text="s.properties.description.split(/<br\s*\/?>/i)[0]"
                    ></option>
                  </template>
                </template>
                <!-- <option value="to1">Tổ 1,2,3,4,5,6,7,8</option>
                <option value="to2">Tổ 15,17,18,19,20</option>
                <option value="to3">Tổ 9,10,11,12,13,14,16,21</option> -->
              </select>
              <!-- <div

              >
                <svg
                  class="h-5 w-5"
                  fill="none"

                    stroke-linejoin="round"
                    stroke-width="2"
                  ></path>
                </svg>

          class="bg-vn-red mt-4 flex w-full items-center justify-center space-x-2 rounded-xl py-4 font-bold text-white shadow-md transition-transform active:scale-95 lg:mx-auto lg:max-w-xs"

      <!-- BEGIN: ResultCard -->
      <template x-if="!selectedStation">
        <section>
          <iframe
            id="custom-map"
            class="aspect-video w-full"
            src="https://www.google.com/maps/d/embed?mid=1QEdI07G9dG1oWAZaJrFSI-NuGOA7XJg&ehbc=2E312F"
            width="640"
            height="480"
          ></iframe>
        </section>
      </template>
      <template x-if="selectedStation">
        <section data-purpose="voting-location-result" id="result-container">
          <div class="rounded-2xl border border-gray-100 bg-white shadow-sm">
            <!-- Header of card -->

            <!-- Content -->
            <div class="space-y-4 p-5">
              <div>
                <h3
                  class="text-vn-red text-2xl font-bold"
                  id="station-name"
                  x-text="selectedStation.properties.name.split('-')[0].trim()"
                >
                  Điểm bầu cử số 1
                </h3>
                <div class="mt-2 flex items-start text-gray-600">
                  <svg
                    class="mr-2 mt-1 h-5 w-5 flex-shrink-0 text-gray-400"
                    fill="none"
                    stroke="currentColor"
                    viewbox="0 0 24 24"
                  >
                    <path
                      d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                    ></path>
                    <path
                      d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                    ></path>
                  </svg>
                  <p
                    class="text-lg leading-snug"
                    id="station-address"
                    x-html="selectedStation.properties.description.split(/<br\s*\/?>/i).slice(1).join('<br>')"
                  >
                    Dãy A Đình Thần Đông Tác
                  </p>
                </div>
              </div>
              <!-- Maps Action -->
              <!-- <a
              class="flex w-full items-center justify-center rounded-xl border-2 border-blue-600 py-3 font-semibold text-blue-600 transition-colors hover:bg-blue-50"
              href="https://maps.google.com"
              target="_blank"
            >
              <svg class="mr-2 h-5 w-5" fill="currentColor" viewbox="0 0 24 24">
                <path

              </svg>
              Xem trên Google Maps

              <div class="mt-5 flex gap-3">
                <a
                  :href="`https://www.google.com/maps/dir/?api=1&destination=${selectedStation.geometry.coordinates[1]},${selectedStation.geometry.coordinates[0]}`"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="bg-vn-red flex flex-1 items-center justify-center gap-2 rounded-xl px-4 py-2.5 text-sm font-medium text-white transition-colors hover:bg-indigo-700"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="h-4 w-4"
                  >
                    <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                  </svg>
                  Chỉ đường
                </a>
                <a
                  :href="`https://www.google.com/maps/search/?api=1&query=${selectedStation.geometry.coordinates[1]},${selectedStation.geometry.coordinates[0]}`"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="flex flex-1 items-center justify-center gap-2 rounded-xl bg-slate-100 px-4 py-2.5 text-sm font-medium text-slate-700 transition-colors hover:bg-slate-200"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="h-4 w-4"
                  >
                    <path
                      d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"
                    ></path>
                    <circle cx="12" cy="10" r="3"></circle>
                  </svg>
                  Mở Google Maps
                </a>
              </div>
              <!-- BEGIN: MapIntegration -->

              <!-- END: MapIntegration -->
            </div>
            <div
              class="relative mt-4 w-full rounded-xl bg-gray-200"
              data-purpose="map-embed"
            >
              <!-- Simulated Map Image Placeholder -->
              <iframe
                title="Google Maps"
                class="aspect-video w-full"
                width="640"
                height="480"
                style="border: 0"
                loading="lazy"
                allowfullscreen
                referrerpolicy="no-referrer-when-downgrade"
                :src="`https://maps.google.com/maps?q=${selectedStation.geometry.coordinates[1]},${selectedStation.geometry.coordinates[0]}&hl=vi&z=16&output=embed`"
              ></iframe>
            </div>
          </div>
        </section>
      </template>
      <!-- END: ResultCard -->
      <!-- BEGIN: InfoInstructions -->
      <section
        class="rounded-xl border border-blue-100 bg-blue-50 p-4 text-sm text-blue-800"
        data-purpose="instructions"
      >
        <h4 class="mb-2 flex items-center font-bold">
          <svg class="mr-1 h-4 w-4" fill="currentColor" viewbox="0 0 20 20">
            <path
              clip-rule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
              fill-rule="evenodd"
            ></path>
          </svg>
          Hướng dẫn quan trọng
        </h4>
        <ul class="list-inside list-disc space-y-1 opacity-90">
          <li>Cử tri vui lòng mang theo Thẻ cử tri/CCCD.</li>
          <li>Ngày bầu cử: Chủ nhật, ngày 15 tháng 3 năm 2026.</li>
          <li>Thời gian bỏ phiếu: 07:00 đến 19:00 ngày bầu cử.</li>
          <!-- <li>Thực hiện quy tắc 5K tại khu vực bỏ phiếu.</li> -->
        </ul>
      </section>

    <script data-purpose="ui-logic">
      // Simple script to toggle results visibility for demo purposes
      // fetch("location.json")
      //   .then((response) => response.json()) // Parse JSON
      //   .then((data) => console.log(data)) // Work with JSON data
      //   .catch((error) => console.error("Error fetching JSON:", error));

      document.addEventListener("alpine:init", () => {
        Alpine.data("pollingApp", () => ({
          neighborhoods: [],
          selectedNeighborhoodId: "",
          selectedStationId: "",
          isLoading: true,
          error: null,

          get selectedNeighborhood() {
            // console.log(
            //   Array.from(this.neighborhoods).find(
            //     (n) => n === this.selectedNeighborhoodId,
            //   ),
            // );
            // console.log("def");

            if (this.isLoading) {
              return [];
            }

            // console.log("abc");
            // console.log(this.isLoading);
            // console.log(this.neighborhoods);
            // console.log(this.neighborhoods[this.selectedNeighborhoodId]);
            // console.log(this.selectedNeighborhoodId);

            return this.neighborhoods[this.selectedNeighborhoodId];
            // console.log(this.neighborhoods);
            // return this.neighborhoods.find(
            //   (n) => n === this.selectedNeighborhoodId,
            // );
          },

          get selectedStation() {
            // console.log("abc");
            // console.log(this.neighborhoods);
            // console.log(this.selectedNeighborhood);

            if (this.isLoading || !this.selectedNeighborhood) {
              return "";
            }

            // console.log(this.selectedNeighborhood);
            // console.log(this.neighborhoods[this.selectedNeighborhoodId]);
            // console.log(
            //   this.neighborhoods[this.selectedNeighborhoodId].find(
            //     (n) => n.properties.name === this.selectedStationId,
            //   ),
            // );

            // return this.neighborhoods[this.selectedNeighborhoodId];

            return this.neighborhoods[this.selectedNeighborhoodId].find(
              (n) => n.properties.name === this.selectedStationId,
            );

            // return this.selectedNeighborhood.find(
            //   (n) => n === this.selectedStationId,
            // );
          },

          handleNeighborhoodChange() {
            this.selectedStationId = "";
          },

          init() {
            this.fetchData();
          },

          async fetchData() {
            try {
              const response = await fetch(
                "https://www.google.com/maps/d/kml?forcekml=1&mid=1QEdI07G9dG1oWAZaJrFSI-NuGOA7XJg",
              );
              if (!response.ok) throw new Error("Network response was not ok");
              const kmlText = await response.text();

              const parser = new DOMParser();
              const kmlDom = parser.parseFromString(kmlText, "text/xml");

              // Check for parsing errors
              const errorNode = kmlDom.querySelector("parsererror");
              if (errorNode) {
                console.error("Error parsing KML:", errorNode.textContent);
                throw new Error("Failed to parse KML");
              }

              // Pass the parsed XML Document to togeojson.kml
              const geojson = toGeoJSON.kml(kmlDom);
              // console.log(geojson);
              this.neighborhoods = Object.groupBy(geojson.features, (item) => {
                // Can return any value, e.g. a type string or even an object key
                return item.properties.name.split("-").pop().trim();
              });
            } catch (err) {
              this.error = err.message;
            } finally {
              this.isLoading = false;
            }

            // const kmlText = await (
            //   await fetch(
            //     "https://www.google.com/maps/d/kml?forcekml=1&mid=1QEdI07G9dG1oWAZaJrFSI-NuGOA7XJg",
            //   )
            // ).text();

            // const parser = new DOMParser();
            // const kmlDom = parser.parseFromString(kmlText, "text/xml");

            // // Check for parsing errors
            // const errorNode = kmlDom.querySelector("parsererror");
            // if (errorNode) {
            //   console.error("Error parsing KML:", errorNode.textContent);
            //   throw new Error("Failed to parse KML");
            // }

            // // Pass the parsed XML Document to togeojson.kml
            // const geojson = toGeoJSON.kml(kmlDom);
            // // console.log(geojson);
            // this.neighborhoods = Object.groupBy(geojson.features, (item) => {
            //   // Can return any value, e.g. a type string or even an object key
            //   return item.properties.name.split("-").pop().trim();
            // });

            // this.neighborhoods = resultMap;
          },
        }));
      });
    </script>
